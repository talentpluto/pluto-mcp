interface:
  display_name: "Pluto candidate discovery"
  short_description: "Find candidates with concise fit evidence"
  default_prompt: "Use $candidate-discovery to forward my complete safe professional query or raw JD once, supply a fresh request ID, and return one concise candidate shortlist. Keep qualification, network, and credit metadata internal unless it materially limits the results, and use returned Client preference fit reasons with their supporting candidate evidence as the primary Why they fit source."

dependencies:
  tools:
    - type: "mcp"
      value: "pluto"
      description: "Pluto's authenticated TalentPluto recruiting MCP server"
      transport: "streamable_http"
      url: "https://app.talentpluto.com/api/mcp"
